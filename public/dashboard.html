<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leads Dashboard</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="page">

  <div class="banner">
    <h1>🎯 Captured Leads</h1>
    <p>Leads collected at the stall · tap 💬 WhatsApp to follow up (needs internet)</p>
  </div>

  <div class="metrics">
    <div class="metric"><b id="m-total">0</b><span>Total</span></div>
    <div class="metric"><b id="m-hot">0</b><span>🔴 Hot</span></div>
    <div class="metric"><b id="m-warm">0</b><span>🟡 Warm</span></div>
    <div class="metric"><b id="m-cold">0</b><span>🟢 Cold</span></div>
    <div class="metric"><b id="m-enriched">0</b><span>✓ Enriched</span></div>
  </div>

  <div class="tools">
    <input id="search" placeholder="Search name / company / phone…">
    <select id="filter"><option value="">All</option><option value="hot">🔴 Hot</option><option value="warm">🟡 Warm</option><option value="cold">🟢 Cold</option></select>
    <a class="btn-primary" style="width:auto;margin-top:0;text-decoration:none" href="/export.csv">⬇ Export CSV</a>
    <button class="btn-primary" style="width:auto;margin-top:0;background:#5F3DC4" onclick="enrichAll(this)">✨ Enrich all pending</button>
  </div>

  <details>
    <summary>✏️ Edit WhatsApp message template</summary>
    <textarea id="tpl" style="margin-top:8px"></textarea>
    <p style="font-size:11px;color:#6b7280;margin-top:4px">Use <code>{name}</code> for the lead's name.</p>
    <button class="btn-primary" style="margin-top:6px" onclick="saveTpl()">Save template</button>
  </details>

  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Lead</th><th>Location</th><th>Products / note</th><th>Phone</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let leads = [], template = "";
function toast(msg, ok = true) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.background = ok ? "#0B7A5E" : "#C92A2A";
  t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2200);
}

async function enrich(id, btn) {
  const label = btn.textContent; btn.textContent = "…"; btn.disabled = true;
  try {
    const r = await fetch(`/api/leads/${id}/enrich`, { method: "POST" });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      toast(d.error === "ocr_not_configured"
        ? "Set GOOGLE_API_KEY in .env to enable OCR"
        : "Enrich failed: " + (d.error || r.status), false);
      return;
    }
    await load();
    toast(d.filled && d.filled.length ? "Filled: " + d.filled.join(", ") : "Nothing new found on the card");
  } finally {
    btn.textContent = label; btn.disabled = false;
  }
}

async function enrichAll(btn) {
  // Client-side loop over the single-lead route so the count ticks live.
  const pending = leads.filter(l => (l.front_url || l.audio_url) && !l.enriched_at);
  if (!pending.length) { toast("Nothing pending — all done"); return; }
  const label = btn.textContent; btn.disabled = true;
  let done = 0, failed = 0;
  try {
    for (const l of pending) {
      btn.textContent = `Enriching ${done + failed + 1}/${pending.length}…`;
      const r = await fetch(`/api/leads/${l.id}/enrich`, { method: "POST" });
      if (r.status === 400) {
        const d = await r.json().catch(() => ({}));
        if (d.error === "ocr_not_configured") { toast("Set GOOGLE_API_KEY in .env to enable OCR", false); return; }
      }
      r.ok ? done++ : failed++;
    }
    await load();
    toast(`Enriched ${done}/${pending.length}` + (failed ? ` (${failed} failed — see logs)` : ""), !failed);
  } finally {
    btn.textContent = label; btn.disabled = false;
  }
}


const $ = id => document.getElementById(id);
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

function waLink(l){
  const msg = template.replace(/{name}/g, l.name || "there");
  return `https://wa.me/${l.wa_phone}?text=${encodeURIComponent(msg)}`;
}

function render(){
  const q = $("search").value.toLowerCase(), f = $("filter").value;
  $("m-total").textContent = leads.length;
  $("m-hot").textContent = leads.filter(l=>l.tag==="hot").length;
  $("m-warm").textContent = leads.filter(l=>l.tag==="warm").length;
  $("m-cold").textContent = leads.filter(l=>l.tag==="cold").length;
  $("m-enriched").textContent = leads.filter(l=>l.enriched_at).length;

  const rows = leads.filter(l =>
    (!f || l.tag===f) &&
    (!q || [l.name,l.company,l.phone,l.email].some(x=>(x||"").toLowerCase().includes(q)))
  );

  $("rows").innerHTML = rows.map(l => {
    const title = esc(l.name) || esc(l.company) || "(no name)";
    const sub = l.name && l.company ? esc(l.company) : "";
    const tag = l.tag ? `<span class="tag ${l.tag}">${l.tag}</span>` : "";
    const thumb = l.front_url
      ? `<a href="${l.front_url}" target="_blank"><img class="thumb" src="${l.front_url}"></a>`
      : `<div class="nothumb">🪪</div>`;
    return `<tr>
      <td>
        <div style="display:flex;gap:9px">
          ${thumb}
          <div>
            <div class="co">${title}${tag}${l.enriched_at ? ` <span class="tag cold">✓ enriched</span>` : ((l.front_url || l.audio_url) ? ` <span class="tag warm">pending</span>` : "")}</div>
            ${sub ? `<div class="ct">${sub}</div>` : ""}
            ${l.email ? `<div class="ct">✉️ ${esc(l.email)}</div>` : ""}
            ${l.website ? `<div class="ct">🌐 <a href="${/^https?:\/\//.test(l.website) ? esc(l.website) : "https://" + esc(l.website)}" target="_blank">${esc(l.website)}</a></div>` : ""}
            <div class="acts">
              <a class="btn bw" href="${waLink(l)}" target="_blank">💬 WhatsApp</a>
              ${l.email ? `<a class="btn be" href="mailto:${esc(l.email)}">✉️ Email</a>` : ""}
              <a class="btn bp" href="tel:+${l.wa_phone}">📞</a>
              ${(l.front_url || l.audio_url) ? `<button class="btn be" onclick="enrich('${l.id}',this)">${l.enriched_at ? "↻ Re-enrich" : "✨ Enrich"}</button>` : ""}
              <button class="btn bp" onclick="toggleDetail('${l.id}')">ⓘ Details</button>
            </div>
          </div>
        </div>
      </td>
      <td>${l.state ? `<span class="sp">${esc(l.state)}</span><br>` : ""}${l.city ? `<span class="muted">${esc(l.city)}</span>` : (l.state ? "" : "—")}</td>
      <td class="pr">${esc(l.products) || "—"}${l.note ? `<div style="margin-top:3px">📝 ${esc(l.note)}</div>` : ""}</td>
      <td class="pr">${esc(l.phone)}</td>
    </tr>` + detailRow(l);
  }).join("") || `<tr><td colspan="4" style="text-align:center;color:#9ca3af;padding:24px">No leads yet</td></tr>`;
}

// Hidden row under each lead showing EVERY field (blanks as "—").
function detailRow(l) {
  const F = (label, val) => `<div><div class="dl">${label}</div><div class="dv">${val || "—"}</div></div>`;
  const site = l.website ? `<a href="${/^https?:\/\//.test(l.website) ? esc(l.website) : "https://" + esc(l.website)}" target="_blank">${esc(l.website)}</a>` : "";
  return `<tr id="d${l.id}" style="display:none"><td colspan="4" style="background:#fafbff">
    <div class="detail">
      ${F("Name", esc(l.name))}${F("Company", esc(l.company))}${F("Priority", esc(l.tag))}
      ${F("Phone", esc(l.phone))}${F("WhatsApp #", esc(l.wa_phone))}${F("Email", esc(l.email))}
      ${F("Website", site)}${F("City", esc(l.city))}${F("State / region", esc(l.state))}
      ${F("Products / interest", esc(l.products))}${F("Note", esc(l.note))}
      ${F("Enriched", l.enriched_at ? esc(l.enriched_at) : "pending")}${F("Captured", esc(l.created_at))}
      ${F("Front photo", l.front_url ? `<a href="${l.front_url}" target="_blank">view</a>` : "")}
      ${F("Back photo", l.back_url ? `<a href="${l.back_url}" target="_blank">view</a>` : "")}
      ${F("Voice note", l.audio_url ? `<a href="${l.audio_url}" target="_blank">▶ play</a>` : "")}
      ${F("Voice transcript", esc(l.audio_transcript))}
    </div></td></tr>`;
}

function toggleDetail(id) {
  const r = document.getElementById("d" + id);
  r.style.display = r.style.display === "none" ? "" : "none";
}

async function saveTpl(){
  template = $("tpl").value;
  await fetch("/api/template",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({template})});
  render();
}

async function load(){
  const [a,b] = await Promise.all([
    fetch("/api/leads").then(r=>r.json()),
    fetch("/api/template").then(r=>r.json()),
  ]);
  leads = a; template = b.template; $("tpl").value = template;
  render();
}

$("search").oninput = render; $("filter").onchange = render;
load();
setInterval(load, 15000);
</script>
</body>
</html>
